<!DOCTYPE html>
<html lang="en">
<head>
    <title>Abbreviation And Acronym Tags</title>
</head>

<body>

    <h1 align="center">
        <u>Abbreviation And Acronym Tags</u>
    </h1>

    <h2>Abbreviation tag</h2>

    <p>
        <abbr title="Doctor">DR</abbr> Raj Mohan
    </p>

    <h2>Acronym tag</h2>

    <p>
        The <abbr title="Mars Tech Campus">MARS TECH</abbr> is Empowering students with practical IT education.
    </p>

    <br><br><br>

    <p>
        <abbr title="Doctor">DR</abbr> Raj Mohan
        <abbr title="Bachelor of Medicine and Bachelor of Surgery">MBBS</abbr>,
        <abbr title="Fellow of the Royal College of Surgeons">FRCS</abbr>
    </p>

    <p>
        The <abbr title="National Aeronautics and Space Administration">NASA</abbr>
        is an independent agency of the United States.
    </p>

    <p>
        The <abbr title="Mars Tech Campus">MARS TECH</abbr>
        is an IT College in Srilanka.
    </p>

</body>
</html>
